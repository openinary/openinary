name: registry

on:
  push:
    branches:
      - main
    paths:
      - 'packages/registry/**'
      - 'packages/ui/src/file-uploader/**'
      - 'apps/api/src/utils/upload-token.ts'
      - 'r/**'
      - '.github/workflows/registry.yml'
  pull_request:
    paths:
      - 'packages/registry/**'
      - 'packages/ui/src/file-uploader/**'
      - 'apps/api/src/utils/upload-token.ts'
      - 'r/**'
      - '.github/workflows/registry.yml'
  workflow_dispatch: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync file-uploader block from @openinary/ui
        run: node scripts/sync-registry-block.mjs

      - name: Fail if registry's file-uploader is out of sync with @openinary/ui
        run: |
          if ! git diff --exit-code -- packages/registry/src/file-uploader/; then
            echo "::error::packages/registry/src/file-uploader is out of sync with packages/ui. Run 'node scripts/sync-registry-block.mjs' and commit the result."
            exit 1
          fi

      - name: Type-check registry
        run: pnpm --filter registry type-check

      - name: Test upload token (unit + cross-check with registry helper)
        run: pnpm --filter api test

      - name: Rebuild registry
        run: pnpm --filter registry registry:build

      - name: Fail if built registry (/r) is stale
        run: |
          if ! git diff --exit-code -- r/; then
            echo "::error::The built registry in /r is out of date. Run 'pnpm --filter registry registry:build' and commit the result."
            exit 1
          fi

  publish:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Checkout marketing site
        uses: actions/checkout@v4
        with:
          repository: openinary/marketing
          token: ${{ secrets.MARKETING_REPO_TOKEN }}
          path: marketing

      - name: Copy built registry into the marketing site
        run: |
          mkdir -p marketing/public/r
          cp r/*.json marketing/public/r/

      - name: Commit and push if changed
        working-directory: marketing
        run: |
          git config user.name "openinary-bot"
          git config user.email "bot@openinary.dev"
          if git diff --quiet -- public/r/; then
            echo "Registry already up to date on the marketing site."
            exit 0
          fi
          git add public/r/
          git commit -m "chore: sync @openinary registry from openinary@${GITHUB_SHA::7}"
          git push
