name: basebuild

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
      - '*.*.*'
    paths:
      - 'docker/**'
      - 'apps/**'
      - 'packages/**'
      - '.github/workflows/basebuild.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (leave empty for latest)'
        required: false
        type: string

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  REGISTRY: docker.io
  IMAGE_FULL: openinary/openinary
  IMAGE_API: openinary/openinary-api

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_release: ${{ steps.version.outputs.is_release }}
      is_preview: ${{ steps.version.outputs.is_preview }}
      major: ${{ steps.semver.outputs.major }}
      minor: ${{ steps.semver.outputs.minor }}
      patch: ${{ steps.semver.outputs.patch }}
      major_minor: ${{ steps.semver.outputs.major_minor }}
    steps:
      - name: Determine version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.version }}" ]; then
              echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
              echo "is_release=true" >> $GITHUB_OUTPUT
              echo "is_preview=false" >> $GITHUB_OUTPUT
            else
              echo "version=latest" >> $GITHUB_OUTPUT
              echo "is_release=false" >> $GITHUB_OUTPUT
              echo "is_preview=false" >> $GITHUB_OUTPUT
            fi
          elif [ "${{ github.ref_type }}" == "tag" ]; then
            # Remove 'refs/tags/' prefix
            TAG_NAME=${GITHUB_REF#refs/tags/}
            echo "version=$TAG_NAME" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "is_preview=false" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            # Push to main branch = preview build
            echo "version=preview" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "is_preview=true" >> $GITHUB_OUTPUT
          else
            echo "version=latest" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "is_preview=false" >> $GITHUB_OUTPUT
          fi
          echo "Determined version: $(cat $GITHUB_OUTPUT | grep version | cut -d'=' -f2)"

      - name: Extract major and minor version
        id: semver
        if: steps.version.outputs.is_release == 'true'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          # Remove 'v' prefix if present
          VERSION=${VERSION#v}
          
          # Extract major, minor, patch
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "patch=$PATCH" >> $GITHUB_OUTPUT
          echo "major_minor=${MAJOR}.${MINOR}" >> $GITHUB_OUTPUT

  build-full:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    needs: determine-version
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare platform pair
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push full image by digest
        id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5
        with:
          context: .
          file: ./docker/full.Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE_FULL }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ env.IMAGE_FULL }}:buildcache-${{ env.PLATFORM_PAIR }}
          cache-to: type=registry,ref=${{ env.IMAGE_FULL }}:buildcache-${{ env.PLATFORM_PAIR }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-full-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-full:
    runs-on: ubuntu-latest
    needs: [determine-version, build-full]
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests/full
          pattern: digests-full-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create manifest list and push
        working-directory: /tmp/digests/full
        run: |
          TAGS="-t ${{ env.IMAGE_FULL }}:${{ needs.determine-version.outputs.version }}"
          if [ "${{ needs.determine-version.outputs.is_release }}" == "true" ]; then
            TAGS="$TAGS -t ${{ env.IMAGE_FULL }}:latest"
            TAGS="$TAGS -t ${{ env.IMAGE_FULL }}:${{ needs.determine-version.outputs.major_minor }}"
            TAGS="$TAGS -t ${{ env.IMAGE_FULL }}:${{ needs.determine-version.outputs.major }}"
          fi
          docker buildx imagetools create $TAGS \
            $(printf '${{ env.IMAGE_FULL }}@sha256:%s ' *)

  build-api:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    needs: determine-version
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare platform pair
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push API image by digest
        id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5
        with:
          context: .
          file: ./docker/api.Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE_API }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ env.IMAGE_API }}:buildcache-${{ env.PLATFORM_PAIR }}
          cache-to: type=registry,ref=${{ env.IMAGE_API }}:buildcache-${{ env.PLATFORM_PAIR }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-api-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-api:
    runs-on: ubuntu-latest
    needs: [determine-version, build-api]
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests/api
          pattern: digests-api-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create manifest list and push
        working-directory: /tmp/digests/api
        run: |
          TAGS="-t ${{ env.IMAGE_API }}:${{ needs.determine-version.outputs.version }}"
          if [ "${{ needs.determine-version.outputs.is_release }}" == "true" ]; then
            TAGS="$TAGS -t ${{ env.IMAGE_API }}:latest"
            TAGS="$TAGS -t ${{ env.IMAGE_API }}:${{ needs.determine-version.outputs.major_minor }}"
            TAGS="$TAGS -t ${{ env.IMAGE_API }}:${{ needs.determine-version.outputs.major }}"
          fi
          docker buildx imagetools create $TAGS \
            $(printf '${{ env.IMAGE_API }}@sha256:%s ' *)

  summary:
    runs-on: ubuntu-latest
    needs: [determine-version, merge-full, merge-api]
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for changelog generation

      - name: Extract changelog for this version
        id: changelog
        if: needs.determine-version.outputs.is_release == 'true'
        run: |
          VERSION=${{ needs.determine-version.outputs.version }}
          
          # Extract the section for this version from CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            # Get content between [VERSION] and next version or end
            CHANGELOG_CONTENT=$(sed -n "/## \[${VERSION#v}\]/,/## \[/p" CHANGELOG.md | sed '$d' | tail -n +2)
            
            # If empty, use default message
            if [ -z "$CHANGELOG_CONTENT" ]; then
              CHANGELOG_CONTENT="See [CHANGELOG.md](https://github.com/openinary/openinary/blob/main/CHANGELOG.md) for details."
            fi
            
            # Write to file to preserve formatting
            echo "$CHANGELOG_CONTENT" > /tmp/changelog.txt
          else
            echo "See commit history for changes." > /tmp/changelog.txt
          fi

      - name: Create GitHub Release
        if: needs.determine-version.outputs.is_release == 'true'
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844  # v1
        with:
          tag_name: ${{ needs.determine-version.outputs.version }}
          name: Release ${{ needs.determine-version.outputs.version }}
          body_path: /tmp/changelog.txt
          draft: false
          prerelease: ${{ contains(needs.determine-version.outputs.version, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          {
            echo "## Docker Build Complete"
            echo ""
            
            if [ "${{ needs.determine-version.outputs.is_preview }}" == "true" ]; then
              echo "**Preview Build** (from main branch)"
              echo ""
            fi
            
            echo "**Build Version:** \`${{ needs.determine-version.outputs.version }}\`"
            echo ""
            
            echo "### Images Built"
            echo "- Full stack image (linux/amd64, linux/arm64)"
            echo "- API-only image (linux/amd64, linux/arm64)"
            echo ""
            
            if [ "${{ needs.determine-version.outputs.is_release }}" == "true" ]; then
              echo "**Tags created:**"
              echo "- Version tag: \`${{ needs.determine-version.outputs.version }}\`"
              echo "- Latest tag: \`latest\`"
              echo "- Major.Minor tag: \`${{ needs.determine-version.outputs.major_minor }}\`"
              echo "- Major tag: \`${{ needs.determine-version.outputs.major }}\`"
              echo ""
              echo "**GitHub Release created:** https://github.com/${{ github.repository }}/releases/tag/${{ needs.determine-version.outputs.version }}"
            else
              echo "**Tag created:** \`${{ needs.determine-version.outputs.version }}\`"
            fi
            echo ""
            echo "Images are available on Docker Hub."
          } >> $GITHUB_STEP_SUMMARY
